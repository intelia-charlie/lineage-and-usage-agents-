name: Infra Build

# Three-phase deploy:
#   1. provision  — terraform apply scoped to project-setup (creates Artifact Registry)
#   2. build      — docker build + push (registry now exists)
#   3. deploy     — terraform apply (full, deploys Cloud Run services with new images)
#
# PAIRED with full_deploy.yml — any Terraform variable added here MUST also be
# added to full_deploy.yml (conventions rule 7).
#
# First-time note: BACKEND_URL will be empty on first run; frontend builds without
# NEXT_PUBLIC_API_BASE. After first deploy, set BACKEND_URL as a GitHub Environment
# var and re-run.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options: [dev, sit, prod]
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: string

jobs:
  provision:
    name: Provision registry
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    env:
      ENV: ${{ inputs.environment }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
      REGION: ${{ vars.REGION }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: ./.github/actions/gcp-auth
        with:
          env: ${{ env.ENV }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.auth.outputs.state_bucket }}" \
            -backend-config="prefix=terraform/lineage-agents-state"

      - name: Terraform Apply (project-setup only)
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -target=module.project_setup \
            -var="project_id=${{ vars.PROJECT_ID }}" \
            -var="project_number=${{ vars.PROJECT_NUMBER }}" \
            -var="region=${{ vars.REGION }}" \
            -var="env=${{ env.ENV }}" \
            -var="image_tag=${{ env.IMAGE_TAG }}" \
            -var="backend_url=${{ vars.BACKEND_URL }}"

  build-backend:
    name: Build backend
    needs: provision
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    env:
      ENV: ${{ inputs.environment }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
      REGION: ${{ vars.REGION }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: ./.github/actions/gcp-auth
        with:
          env: ${{ env.ENV }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t ${{ steps.auth.outputs.registry }}/backend:${{ env.IMAGE_TAG }} \
            -t ${{ steps.auth.outputs.registry }}/backend:latest \
            .
          docker push ${{ steps.auth.outputs.registry }}/backend:${{ env.IMAGE_TAG }}
          docker push ${{ steps.auth.outputs.registry }}/backend:latest

  build-frontend:
    name: Build frontend
    needs: provision
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    env:
      ENV: ${{ inputs.environment }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
      REGION: ${{ vars.REGION }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: ./.github/actions/gcp-auth
        with:
          env: ${{ env.ENV }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.REGION }}-docker.pkg.dev --quiet

      - name: Build and push frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE=${{ vars.BACKEND_URL }} \
            -t ${{ steps.auth.outputs.registry }}/frontend:${{ env.IMAGE_TAG }} \
            -t ${{ steps.auth.outputs.registry }}/frontend:latest \
            frontend/
          docker push ${{ steps.auth.outputs.registry }}/frontend:${{ env.IMAGE_TAG }}
          docker push ${{ steps.auth.outputs.registry }}/frontend:latest

  deploy:
    name: Terraform Apply (full)
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    env:
      ENV: ${{ inputs.environment }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
      REGION: ${{ vars.REGION }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: ./.github/actions/gcp-auth
        with:
          env: ${{ env.ENV }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.auth.outputs.state_bucket }}" \
            -backend-config="prefix=terraform/lineage-agents-state"

      - name: Terraform Apply (full)
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ vars.PROJECT_ID }}" \
            -var="project_number=${{ vars.PROJECT_NUMBER }}" \
            -var="region=${{ vars.REGION }}" \
            -var="env=${{ env.ENV }}" \
            -var="image_tag=${{ env.IMAGE_TAG }}" \
            -var="backend_url=${{ vars.BACKEND_URL }}"

      - name: Print service URLs
        working-directory: terraform
        run: |
          echo "Backend:  $(terraform output -raw backend_url)"
          echo "Frontend: $(terraform output -raw frontend_url)"
